name: ansible-stage-one-testing-definition

hosts:
  - name: windows-10
    base_box:
      image: windows-10
      man_user: windows
      mng_protocol: winrm
    flavor: a4-8-35

routers:
  - name: debian-12-router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: a1-2-20

networks:
  - name: debian-12-network
    cidr: 172.18.3.0/24

net_mappings:
  - host: windows-10
    network: debian-12-network
    ip: 172.18.3.11

router_mappings:
  - router: debian-12-router
    network: debian-12-network
    ip: 172.18.3.1

groups:
  - name: monitor-os
    nodes: []
  - name: monitor-icmp
    nodes: []
