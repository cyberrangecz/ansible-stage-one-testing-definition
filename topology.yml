name: ansible-stage-one-testing-definition-netplan

hosts:
  - name: ubuntu-2204
    base_box:
      image: ubuntu-22.04
      man_user: ubuntu
    flavor: a1-2-20

  - name: xubuntu-2204
    base_box:
      image: xubuntu-22.04
      man_user: ubuntu
    flavor: a2-4-35

  - name: ubuntu-noble
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: a1-2-20

routers:
  - name: ubuntu-noble-router
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: a1-2-20

networks:
  - name: ubuntu-noble-network
    cidr: 172.18.4.0/24

net_mappings:

  - host: ubuntu-2204
    network: ubuntu-noble-network
    ip: 172.18.4.21

  - host: xubuntu-2204
    network: ubuntu-noble-network
    ip: 172.18.4.30

  - host: ubuntu-noble
    network: ubuntu-noble-network
    ip: 172.18.4.40


router_mappings:
  - router: ubuntu-noble-router
    network: ubuntu-noble-network
    ip: 172.18.4.1

groups:
  - name: monitor-os
    nodes: []
  - name: monitor-icmp
    nodes: []
