name: ansible-stage-one-testing-definition-images

hosts:
  - name: windows-10
    base_box:
      image: windows-10
      man_user: windows
      mng_protocol: winrm
    flavor: a4-8-35

  - name: kali
    base_box:
      image: kali
      man_user: debian
    flavor: a2-4-35

  - name: xubuntu-2204
    base_box:
      image: xubuntu-22.04
      man_user: ubuntu
    flavor: a2-4-35

routers:
  - name: debian-12-router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: a1-2-20

networks:
  - name: debian-12-network
    cidr: 172.18.3.0/24

net_mappings:
  - host: windows-10
    network: debian-12-network
    ip: 172.18.3.11

  - host: kali
    network: debian-12-network
    ip: 172.18.3.20

  - host: xubuntu-2204
    network: debian-12-network
    ip: 172.18.3.30

router_mappings:
  - router: debian-12-router
    network: debian-12-network
    ip: 172.18.3.1

groups:
  - name: monitor-os
    nodes: []
  - name: monitor-icmp
    nodes: []
