name: ansible-stage-one-kali-testing-definition

hosts:
  - name: kali
    base_box:
      image: kali
      man_user: debian
    flavor: a2-4-35

  - name: kali-050
    base_box:
      image: kali-0.5.0
      man_user: debian
    flavor: a2-4-35
routers:
  - name: debian-12-router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: a1-2-20

networks:
  - name: debian-12-network
    cidr: 172.18.3.0/24

net_mappings:
  - host: kali
    network: debian-12-network
    ip: 172.18.3.20

  - host: kali-050
    network: debian-12-network
    ip: 172.18.3.30

router_mappings:
  - router: debian-12-router
    network: debian-12-network
    ip: 172.18.3.1

groups:
  - name: monitor-os
    nodes: []
  - name: monitor-icmp
    nodes: []
